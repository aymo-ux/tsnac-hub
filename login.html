<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TSNAC Hub — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-primary: #f7f8fa;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f3f6;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border: rgba(15, 23, 42, 0.07);
      --border-light: rgba(15, 23, 42, 0.11);
      --border-hover: rgba(15, 23, 42, 0.2);
      --accent: #4f46e5;
      --accent-dark: #4338ca;
      --accent-soft: rgba(79, 70, 229, 0.08);
      --danger: #dc2626;
      --danger-bg: rgba(220, 38, 38, 0.08);
      --success: #059669;
      --success-bg: rgba(5, 150, 105, 0.08);
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.05);
      --shadow-lg: 0 4px 24px rgba(15, 23, 42, 0.08), 0 1px 3px rgba(15, 23, 42, 0.04);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.005em;
    }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; } }
    .login-container { width: 100%; max-width: 400px; }
    .login-header { text-align: center; margin-bottom: 1.75rem; }
    .logo { display: inline-flex; align-items: center; gap: 0.7rem; margin-bottom: 0.85rem; }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.35rem;
      box-shadow: 0 6px 16px rgba(79, 70, 229, 0.25);
    }
    .logo-text { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; }
    .login-subtitle { color: var(--text-secondary); font-size: 0.92rem; }
    .login-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      box-shadow: var(--shadow-lg);
    }
    .form-group { margin-bottom: 1.1rem; }
    .form-label { display: block; margin-bottom: 0.4rem; font-size: 0.85rem; font-weight: 500; color: var(--text-secondary); }
    .input-wrap { position: relative; }
    .form-input {
      width: 100%;
      padding: 0.8rem 0.95rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: 9px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .pw-toggle {
      position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 0.8rem; font-family: inherit;
      padding: 0.35rem 0.5rem; border-radius: 6px; font-weight: 500;
    }
    .pw-toggle:hover { color: var(--text-secondary); background: var(--bg-tertiary); }
    .btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      border: 1px solid transparent;
      border-radius: 9px;
      color: white;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, box-shadow 0.18s;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      box-shadow: var(--shadow-sm);
      margin-top: 0.35rem;
    }
    .btn:hover:not(:disabled) { background: var(--accent-dark); }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .message {
      padding: 0.8rem 0.95rem;
      border-radius: 9px;
      font-size: 0.88rem;
      margin-bottom: 1.1rem;
      display: none;
      line-height: 1.4;
    }
    .message.show { display: block; }
    .error-message { background: var(--danger-bg); border: 1px solid rgba(220,38,38,0.2); color: var(--danger); }
    .success-message { background: var(--success-bg); border: 1px solid rgba(5,150,105,0.2); color: var(--success); }
    .loading {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 50%; border-top-color: white;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer-text { text-align: center; margin-top: 1.5rem; font-size: 0.82rem; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="logo">
        <div class="logo-icon">📊</div>
        <span class="logo-text">TSNAC Hub</span>
      </div>
      <p class="login-subtitle">Sign in to your team dashboard</p>
    </div>

    <div class="login-card">
      <div id="error-message" class="message error-message" role="alert" aria-live="assertive"></div>
      <div id="success-message" class="message success-message" role="status" aria-live="polite"></div>

      <form id="login-form" onsubmit="handleLogin(event)" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input type="email" class="form-input" id="login-email" name="email"
            placeholder="you@company.com" required
            autocomplete="email" inputmode="email" autocapitalize="off" autocorrect="off" spellcheck="false">
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <div class="input-wrap">
            <input type="password" class="form-input" id="login-password" name="password"
              placeholder="••••••••" required autocomplete="current-password" style="padding-right: 4rem;">
            <button type="button" class="pw-toggle" id="pw-toggle" onclick="togglePassword()" aria-label="Show password">Show</button>
          </div>
        </div>

        <button type="submit" class="btn" id="login-btn">Sign in</button>
      </form>
    </div>

    <p class="footer-text">Powered by TSNAC</p>
  </div>

  <script>
    // Supabase configuration
    const SUPABASE_URL = 'https://mzfomflhvyohwsdeyauf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16Zm9tZmxodnlvaHdzZGV5YXVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1Njg3OTYsImV4cCI6MjA5MTE0NDc5Nn0.gfBg9vCPOzIeAGWMWyMoObd1XmFbF2rXsiBzohI2uSs';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // If already signed in, go straight to the app
    async function checkSession() {
      try {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) window.location.href = 'index.html';
      } catch (e) { /* no active session */ }
    }
    checkSession();

    function showError(message) {
      const el = document.getElementById('error-message');
      el.textContent = message;
      el.classList.add('show');
      document.getElementById('success-message').classList.remove('show');
    }
    function hideMessages() {
      document.getElementById('error-message').classList.remove('show');
      document.getElementById('success-message').classList.remove('show');
    }
    function togglePassword() {
      const input = document.getElementById('login-password');
      const btn = document.getElementById('pw-toggle');
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      btn.textContent = show ? 'Hide' : 'Show';
      btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const email = document.getElementById('login-email').value.trim().toLowerCase();
      const password = document.getElementById('login-password').value;

      if (!email || !password) { showError('Please enter your email and password.'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> Signing in…';
      hideMessages();

      try {
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;
        window.location.href = 'index.html';
      } catch (error) {
        // Keep the message generic so it never reveals whether an email exists
        showError('Incorrect email or password. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    }
  </script>
</body>
</html>
